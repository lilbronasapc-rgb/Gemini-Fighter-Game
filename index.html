                } else if (state === 'cast' && this.castType === 'saitama_consec') {
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 35, 12, 4); ctx.fill(); drawHand(33, -94);
                } else if (state === 'cast' && this.castType === 'gutsspin' && this.hasSword) {
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 35, 12, 4); ctx.fill(); drawHand(33, -94);
                    if (this.castTimer < 2000) {
                        ctx.save(); ctx.translate(33, -94); ctx.rotate((Date.now()%300)/300 * Math.PI*2);
                        ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(-60, -5); ctx.lineTo(60, -5); ctx.lineTo(70, 0); ctx.lineTo(60, 5); ctx.lineTo(-60, 5); ctx.fill(); ctx.stroke(); ctx.restore();
                    } else {
                        // Forward slash freeze frame
                        ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(25, -92); ctx.lineTo(100, -92); ctx.lineTo(110, -94); ctx.lineTo(100, -96); ctx.lineTo(25, -96); ctx.fill(); ctx.stroke();
                    }
                } else if (state === 'cast' && this.castType === 'fuga') {
                    if (this.castTimer < 200) { ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 35, 12, 4); ctx.fill(); drawHand(33, -94); } 
                    else { ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 45, 12, 4); ctx.fill(); drawHand(42, -94); ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-24, -95, 24, 12, 4); ctx.fill(); drawHand(-28, -89); }
                } else if (state === 'cast' && this.castType === 'light_write') {
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 35, 12, 4); ctx.fill(); drawHand(33, -94);
                } else if (this.isBlocking || this.saitamaUltPrimed) {
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 12, -28, 4); ctx.fill(); drawHand(0, -132);
                } else if (state === 'dash') {
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 35, 12, 4); ctx.fill(); drawHand(33, -94);
                } else if (state === 'dance_floss') {
                    ctx.save(); ctx.translate(0, -100); 
                    ctx.save(); ctx.rotate((armSwing - 20) * Math.PI / 180); 
                    ctx.fillStyle = topColor; ctx.globalAlpha = 0.7;
                    ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); ctx.globalAlpha = 1.0; drawHand(0, 48); 
                    ctx.restore();
                    ctx.save(); ctx.rotate((armSwing + 20) * Math.PI / 180); 
                    ctx.fillStyle = topColor;
                    ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); drawHand(0, 48); 
                    ctx.restore();
                    ctx.restore();
                } else if (state === 'dance_pump') {
                    ctx.save(); ctx.translate(0, -100); 
                    ctx.save(); ctx.rotate(-20 * Math.PI / 180); 
                    ctx.fillStyle = topColor; ctx.globalAlpha = 0.7;
                    ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); ctx.globalAlpha = 1.0; drawHand(0, 48); 
                    ctx.restore();
                    ctx.save(); 
                    let pumpExt = Math.abs(Math.sin((this.flossTimer || 0) * 0.01 * 2)) * 15;
                    ctx.rotate(Math.PI); ctx.translate(0, pumpExt - 15);
                    ctx.fillStyle = topColor;
                    ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); drawHand(0, 48); 
                    ctx.restore();
                    ctx.restore();
                } else if (state === 'dance_wiggle') {
                    ctx.save(); ctx.translate(0, -100); 
                    ctx.save(); ctx.rotate((armSwing - 45) * Math.PI / 180); 
                    ctx.fillStyle = topColor; ctx.globalAlpha = 0.7;
                    ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); ctx.globalAlpha = 1.0; drawHand(0, 48); 
                    ctx.restore();
                    ctx.save(); ctx.rotate((armSwing + 45) * Math.PI / 180); 
                    ctx.fillStyle = topColor;
                    ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); drawHand(0, 48); 
                    ctx.restore();
                    ctx.restore();
                } else {
                    ctx.save(); ctx.translate(0, -100); ctx.rotate(armSwing * Math.PI / 180); 
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); drawHand(0, 48); ctx.restore();
                }

                // Head
                if (hair !== 'transparent') {
                    ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, -125, 13, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, -125, 14, 0, Math.PI * 2); ctx.fill(); 
                }

                if (isGojo) {
                    if (this.skinName !== 'Shinjuku') {
                        ctx.fillStyle = '#000000'; ctx.fillRect(-12, -132, 24, 12); // Wider blindfold
                    }
                } else if (isSukuna) {
                    // Refined black face tattoos, no eyes/mouth
                    ctx.fillStyle = '#000000'; 
                    ctx.fillRect(-8, -133, 16, 2); // Forehead line
                    ctx.fillRect(-10, -126, 6, 2); // Left cheek
                    ctx.fillRect(4, -126, 6, 2);   // Right cheek
                    ctx.fillRect(-6, -122, 12, 2); // Nose band
                } else if (isOmni) {
                    if (this.skinName === 'Invincible') {
                        ctx.lineWidth = 1.5; ctx.strokeStyle = '#64748b'; ctx.fillStyle = '#ffffff';
                        ctx.beginPath(); ctx.arc(2, -128, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                        ctx.beginPath(); ctx.arc(11, -128, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    } else if (this.skinName === 'Thragg') {
                        ctx.fillStyle = '#000000'; ctx.fillRect(-2, -121, 10, 3); 
                    } else if (this.skinName === 'Conquest') {
                        ctx.fillStyle = '#ffffff'; ctx.fillRect(-2, -121, 10, 3); 
                    } else {
                        ctx.fillStyle = '#000000'; ctx.fillRect(-2, -121, 10, 3);
                    }
                } else if (isGuts) {
                    ctx.fillStyle = '#000000'; ctx.fillRect(-5, -128, 12, 2);
                } else if (isSaitama) {
                    if (this.seriousness >= 100) {
                        ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
                        ctx.beginPath(); ctx.arc(2, -128, 3, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    } else {
                        ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(2, -128, 2, 0, Math.PI*2); ctx.fill();
                    }
                }

                // Hair
                if (hair !== 'transparent') {
                    ctx.fillStyle = hair; ctx.beginPath();
                    if (isGojo) {
                        // Taller, spikier hair
                        ctx.moveTo(-15, -130); ctx.lineTo(-22, -145); ctx.lineTo(-12, -135); ctx.lineTo(-8, -158); ctx.lineTo(0, -135); ctx.lineTo(10, -155); ctx.lineTo(12, -135); ctx.lineTo(20, -142); ctx.lineTo(15, -130); ctx.fill();
                    } else if (isSukuna) {
                        // More aggressive anime-style spiky hair (Yuji/Sukuna)
                        ctx.beginPath(); ctx.arc(0, -130, 14, Math.PI, 0); ctx.fill(); // Base layer
                        ctx.beginPath();
                        ctx.moveTo(-14, -130);
                        ctx.lineTo(-18, -142); ctx.lineTo(-8, -136); 
                        ctx.lineTo(-10, -150); ctx.lineTo(-2, -138); 
                        ctx.lineTo(2, -155);  ctx.lineTo(6, -138);  
                        ctx.lineTo(14, -150); ctx.lineTo(10, -136); 
                        ctx.lineTo(20, -142); ctx.lineTo(14, -130); 
                        ctx.fill();
                    } else if (isOmni) {
                        if (this.skinName === 'Conquest') {
                            ctx.moveTo(-13, -125); ctx.lineTo(-17, -135); ctx.lineTo(-10, -135); ctx.fill();
                            ctx.beginPath(); ctx.moveTo(13, -125); ctx.lineTo(17, -135); ctx.lineTo(10, -135); ctx.fill();
                        } else {
                            ctx.moveTo(-13, -125); ctx.lineTo(-15, -135); ctx.lineTo(0, -140); ctx.lineTo(12, -135); ctx.lineTo(15, -125); ctx.lineTo(10, -133); ctx.lineTo(-10, -133); ctx.fill();
                        }
                    } else if (isGuts) {
                        ctx.moveTo(-13, -125); ctx.lineTo(-18, -132); ctx.lineTo(-10, -140); ctx.lineTo(-5, -150); ctx.lineTo(2, -140); ctx.lineTo(10, -145); ctx.lineTo(15, -130); ctx.fill();
                    } else if (isLight) {
                        ctx.moveTo(-13, -125); ctx.lineTo(-16, -135); ctx.lineTo(-8, -140); ctx.lineTo(0, -145); ctx.lineTo(8, -140); ctx.lineTo(16, -135); ctx.lineTo(13, -125); ctx.lineTo(10, -133); ctx.lineTo(-10, -133); ctx.fill();
                    }
                }

                ctx.restore(); 
                ctx.restore(); 
            }
        }

        // --- AI System ---
        function updateAI(ai, opp, dt, playerNum) {
            if (ai.stunTimer > 0 || ai.hp <= 0 || gameState !== 'play') return;

            let dx = opp.x - ai.x;
            let dy = opp.y - ai.y;
            let dist = Math.abs(dx);
            let dir = dx > 0 ? 1 : -1;

            if (ai.charType === 'saitama' && ai.saitamaUltPrimed) {
                ai.aiUltTimer = (ai.aiUltTimer || 0) + dt;
                if (ai.aiUltTimer > 2500) {
                    keys[ai.controls.a4] = true;
                    ai.aiUltTimer = 0;
                } else {
                    keys[ai.controls.a4] = false;
                }
            } else if (!ai.isCasting || ai.castType !== 'omniult') {
                ai.aiUltTimer = 0;
            }

            if (ai.isCasting) {
                Object.values(ai.controls).forEach(k => keys[k] = false); 
                if (dir > 0) keys[ai.controls.right] = true;
                else keys[ai.controls.left] = true;

                if (dy < -40) keys[ai.controls.up] = true;
                else if (dy > 40) keys[ai.controls.down] = true;

                if (ai.castType === 'omniult') {
                    ai.aiUltTimer = (ai.aiUltTimer || 0) + dt;
                    if (ai.aiUltTimer > 2500) {
                        keys[ai.controls.a4] = true;
                    }
                }
                return; 
            }

            if (ai.aiMoveDir === 1) keys[dir > 0 ? ai.controls.right : ai.controls.left] = true;
            else if (ai.aiMoveDir === -1) keys[dir > 0 ? ai.controls.left : ai.controls.right] = true;
            if (ai.aiIsBlocking) keys[ai.controls.block] = true;

            ai.aiReactionTimer = (ai.aiReactionTimer || 0) - dt;
            if (ai.aiReactionTimer > 0) return;

            let difficulty = document.getElementById(`ai-difficulty-p${playerNum}`).value;
            let reactBase, blockProb, jumpProb, dashProb, atkProbMult;
            if (difficulty === 'hard') { reactBase = 150; blockProb = 0.7; jumpProb = 0.6; dashProb = 0.4; atkProbMult = 1.0; }
            else if (difficulty === 'medium') { reactBase = 300; blockProb = 0.4; jumpProb = 0.3; dashProb = 0.2; atkProbMult = 0.6; }
            else { reactBase = 600; blockProb = 0.1; jumpProb = 0.1; dashProb = 0.1; atkProbMult = 0.3; }

            ai.aiReactionTimer = reactBase + Math.random() * reactBase; 
            ai.aiIsBlocking = false; 

            if (ai.charType === 'guts' && !ai.hasSword && ai.swordRef && ai.swordRef.stuckInWall) {
                let sdx = ai.swordRef.x - ai.x;
                let sdy = ai.swordRef.y - ai.y;
                keys[sdx > 0 ? ai.controls.right : ai.controls.left] = true;
                ai.aiMoveDir = 0; 
                if (Math.abs(sdx) < 80 && sdy < -40 && ai.onGround) keys[ai.controls.jump] = true;
                return; 
            }

            let danger = projectiles.find(p => p.caster === opp && p.active && Math.abs(p.x - ai.x) < 350 && ((p.dir > 0 && ai.x > p.x) || (p.dir < 0 && ai.x < p.x)));
            if (danger) {
                let distToDanger = Math.abs(danger.x - ai.x);
                if (distToDanger < 150) {
                    if (!ai.onGround || Math.random() < jumpProb) keys[ai.controls.jump] = true;
                    if ((ai.cooldowns['dash']||0) <= 0 && Math.random() < dashProb) {
                        keys[danger.dir > 0 ? ai.controls.right : ai.controls.left] = true; 
                        keys[ai.controls.dash] = true;
                        return;
                    }
                }
                if (Math.random() < blockProb) ai.aiIsBlocking = true;
                return;
            }

            if (opp.isCasting && dist < 150 && opp.castType !== 'purple' && opp.castType !== 'omniult' && opp.castType !== 'fuga' && opp.castType !== 'saitama_ult' && opp.castType !== 'light_write') {
                if (ai.charType === 'saitama' && (ai.cooldowns[ai.controls.passive]||0) <= 0 && ai.ce >= ai.getCost(ai.controls.passive) && Math.random() < blockProb) {
                    keys[ai.controls.passive] = true;
                    return;
                }
                if (Math.random() < blockProb) ai.aiIsBlocking = true;
                if ((ai.cooldowns['dash']||0) <= 0 && Math.random() < dashProb) {
                    keys[dir > 0 ? ai.controls.left : ai.controls.right] = true; 
                    keys[ai.controls.dash] = true;
                }
                return;
            }

            ai.aiMoveTimer = (ai.aiMoveTimer || 0) - dt;
            if (ai.aiMoveTimer <= 0) {
                ai.aiMoveTimer = 500 + Math.random() * 800; 
                let mr = Math.random();
                ai.aiMoveDir = 0; 
                if (dist > 250) {
                    ai.aiMoveDir = 1; 
                } else if (dist < 90) {
                    if (mr < 0.6) ai.aiMoveDir = -1; 
                } else {
                    if (mr < 0.6) ai.aiMoveDir = 1; 
                    else if (mr < 0.9) ai.aiMoveDir = -1; 
                }
            }

            if (ai.aiMoveDir === 1) keys[dir > 0 ? ai.controls.right : ai.controls.left] = true;
            else if (ai.aiMoveDir === -1) keys[dir > 0 ? ai.controls.left : ai.controls.right] = true;
            if (ai.aiIsBlocking) keys[ai.controls.block] = true;

            if (dist > 300 && (ai.cooldowns['dash']||0) <= 0 && Math.random() < 0.3 * atkProbMult) {
                keys[ai.controls.dash] = true;
            }

            let canAtk = Math.random() < atkProbMult;
            if (canAtk && !ai.saitamaUltPrimed) {
                if (dist > 180) {
                    if (ai.charType === 'sukuna' && (ai.cooldowns[ai.controls.a1]||0) <= 0 && ai.ce >= ai.getCost(ai.controls.a1)) keys[ai.controls.a1] = true;
                    if (ai.charType === 'gojo' && (ai.cooldowns[ai.controls.a3]||0) <= 0 && ai.ce >= ai.getCost(ai.controls.a3)) keys[ai.controls.a3] = true;
                    if (ai.charType === 'omniman' && (ai.cooldowns[ai.controls.a2]||0) <= 0 && ai.ce >= ai.getCost(ai.controls.a2)) keys[ai.controls.a2] = true;
                    if (ai.charType === 'guts' && ai.hasSword && (ai.cooldowns[ai.controls.passive]||0) <= 0) keys[ai.controls.passive] = true; 
                    if (ai.charType === 'saitama' && (ai.cooldowns[ai.controls.a1]||0) <= 0 && ai.ce >= ai.getCost(ai.controls.a1)) keys[ai.controls.a1] = true;
                    
                    if (ai.charType === 'light') {
                        if (ai.lightNameProgress >= 5 && (ai.cooldowns[ai.controls.a4]||0) <= 0) keys[ai.controls.a4] = true;
                        else if (ai.hp > 30 && (ai.cooldowns[ai.controls.passive]||0) <= 0 && Math.random() < 0.5) keys[ai.controls.passive] = true;
                        else if ((ai.cooldowns[ai.controls.a2]||0) <= 0) keys[ai.controls.a2] = true;
                        else if ((ai.cooldowns[ai.controls.a3]||0) <= 0) keys[ai.controls.a3] = true;
                    }
                } else {
                    if (ai.charType === 'guts' && ai.hasSword && !ai.gutsUsedUlt && ai.gutsStacks >= 5 && (ai.cooldowns[ai.controls.a4]||0) <= 0) {
                        keys[ai.controls.a4] = true;
                    } else if (ai.ult >= ai.maxUlt && (ai.cooldowns[ai.controls.a4]||0) <= 0 && ai.charType !== 'guts') {
                        keys[ai.controls.a4] = true; 
                    } else if (!ai.hasSword && ai.charType === 'guts' && ai.swordRef && ai.swordRef.stuckInTarget && (ai.cooldowns[ai.controls.passive]||0) <= 0) {
                        keys[ai.controls.passive] = true; 
                    } else if ((ai.cooldowns[ai.controls.a1]||0) <= 0 && Math.random() < 0.8 && ai.ce >= ai.getCost(ai.controls.a1)) {
                        keys[ai.controls.a1] = true;
                    } else if ((ai.cooldowns[ai.controls.a2]||0) <= 0 && Math.random() < 0.8 && ai.ce >= ai.getCost(ai.controls.a2)) {
                        keys[ai.controls.a2] = true;
                    } else if ((ai.cooldowns[ai.controls.a3]||0) <= 0 && Math.random() < 0.8 && ai.ce >= ai.getCost(ai.controls.a3)) {
                        keys[ai.controls.a3] = true;
                    }
                }
            }
        }

        // --- Initialization & Loop ---
        let p1; let p2;
        let projectiles = [];

        function updateCharButtons() {
            const charContainer1 = document.querySelector('#box-p1 .char-buttons');
            const charContainer2 = document.querySelector('#box-p2 .char-buttons');
            
            if (p1Mode === 2) {
                charContainer1.style.opacity = '0.3';
                charContainer1.style.pointerEvents = 'none';
            } else {
                charContainer1.style.opacity = '1';
                charContainer1.style.pointerEvents = 'auto';
            }
            
            if (p2Mode === 2) {
                charContainer2.style.opacity = '0.3';
                charContainer2.style.pointerEvents = 'none';
            } else {
                charContainer2.style.opacity = '1';
                charContainer2.style.pointerEvents = 'auto';
            }

            const chars = ['gojo', 'sukuna', 'omniman', 'guts', 'saitama', 'light'];
            chars.forEach(c => {
                let b1 = document.getElementById(`btn-p1-${c}`);
                let b2 = document.getElementById(`btn-p2-${c}`);
                if (b1) {
                    b1.style.opacity = (selectedP2 === c && p2Mode !== 2) ? '0.3' : '1';
                    b1.style.cursor = (selectedP2 === c && p2Mode !== 2) ? 'not-allowed' : 'pointer';
                }
                if (b2) {
                    b2.style.opacity = (selectedP1 === c && p1Mode !== 2) ? '0.3' : '1';
                    b2.style.cursor = (selectedP1 === c && p1Mode !== 2) ? 'not-allowed' : 'pointer';
                }
            });
            
            let p1Ready = (p1Mode === 2) || selectedP1;
            let p2Ready = (p2Mode === 2) || selectedP2;
            if (p1Ready && p2Ready) document.getElementById('start-btn').style.display = 'block';
            else document.getElementById('start-btn').style.display = 'none';
        }

        function toggleAI(playerNum) {
            let btn = document.getElementById(`btn-toggle-ai-p${playerNum}`);
            let settings = document.getElementById(`ai-settings-p${playerNum}`);
            let charBox = document.querySelector(`#box-p${playerNum} .char-buttons`);
            let mode = playerNum === 1 ? p1Mode : p2Mode;
            
            mode = (mode + 1) % 3; // Cycle: 0 -> 1 -> 2 -> 0
            
            if (playerNum === 1) p1Mode = mode;
            else p2Mode = mode;
            
            if (mode === 1) {
                btn.innerText = `Player ${playerNum} is: AI`;
                btn.style.background = "#a855f7"; 
                btn.style.borderColor = "#d8b4fe";
                settings.style.display = "block";
                charBox.style.opacity = '1';
                charBox.style.pointerEvents = 'auto';
            } else if (mode === 2) {
                btn.innerText = `Player ${playerNum} is: DUMMY`;
                btn.style.background = "#475569"; 
                btn.style.borderColor = "#64748b";
                settings.style.display = "none";
                charBox.style.opacity = '0.3';
                charBox.style.pointerEvents = 'none';
            } else {
                btn.innerText = `Player ${playerNum} is: HUMAN`;
                btn.style.background = playerNum === 1 ? "#3b82f6" : "#ef4444";
                btn.style.borderColor = playerNum === 1 ? "#60a5fa" : "#fca5a5";
                settings.style.display = "none";
                charBox.style.opacity = '1';
                charBox.style.pointerEvents = 'auto';
            }
            updateCharButtons();
        }

        function selectChar(playerNum, charName) {
            if (playerNum === 1 && p1Mode === 2) return;
            if (playerNum === 2 && p2Mode === 2) return;

            if (playerNum === 1 && selectedP2 === charName && p2Mode !== 2) return;
            if (playerNum === 2 && selectedP1 === charName && p1Mode !== 2) return;

            document.querySelectorAll(`#box-p${playerNum} .char-btn`).forEach(b => b.classList.remove(`selected-p${playerNum}`));
            document.getElementById(`btn-p${playerNum}-${charName}`).classList.add(`selected-p${playerNum}`);
            
            if (playerNum === 1) selectedP1 = charName;
            if (playerNum === 2) selectedP2 = charName;

            updateCharButtons();
        }

        function startGame() {
            isImmortality = document.getElementById('immortality-toggle').checked;
            isNoCooldowns = document.getElementById('no-cd-toggle').checked;
            isDoubleDamage = document.getElementById('double-dmg-toggle').checked;
            isDoubleHP = document.getElementById('double-hp-toggle').checked;

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            
            if (isImmortality || p1Mode === 2 || p2Mode === 2) {
                document.getElementById('top-menu-bar').style.display = 'block';
            } else {
                document.getElementById('top-menu-bar').style.display = 'none';
            }

            gameState = 'countdown'; matchWinner = null; showWinnerText = false;
            countdownTimer = 3000; fightTextTimer = 0;
            
            resize(); 
            
            let c1 = p1Mode === 2 ? 'dummy' : selectedP1;
            let c2 = p2Mode === 2 ? 'dummy' : selectedP2;
            
            let p1StartX = c1 === 'dummy' ? canvas.width / 2 : canvas.width * 0.2;
            let p2StartX = c2 === 'dummy' ? canvas.width / 2 : canvas.width * 0.8;
            
            p1 = new Player(p1StartX, groundY, c1, {
                left: 'a', right: 'd', up: 'w', down: 's', jump: 'w', block: 'f', dash: 'q', passive: 'g', a1: '1', a2: '2', a3: '3', a4: '4'
            }, p1Skins[c1] || 0);
            p2 = new Player(p2StartX, groundY, c2, {
                left: 'arrowleft', right: 'arrowright', up: 'arrowup', down: 'arrowdown', jump: 'arrowup', block: 'k', dash: 'p', passive: 'l', a1: '7', a2: '8', a3: '9', a4: '0'
            }, p2Skins[c2] || 0);
            p2.facing = -1; 
            projectiles = []; particles = [];
            
            if(lastTime === 0) requestAnimationFrame(loop);
        }

        function returnToSelect() {
            gameState = 'select';
            document.getElementById('selection-screen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('top-menu-bar').style.display = 'none';
            selectedP1 = null; selectedP2 = null;
            document.querySelectorAll('.char-btn').forEach(b => { b.classList.remove('selected-p1'); b.classList.remove('selected-p2'); });
            document.getElementById('start-btn').style.display = 'none';
            updateCharButtons();
        }

        function drawPreviews() {
            const chars = ['gojo', 'sukuna', 'omniman', 'guts', 'saitama', 'light'];
            chars.forEach(char => {
                [1, 2].forEach(pNum => {
                    const c = document.getElementById(`cvs-p${pNum}-${char}`);
                    if(c) {
                        const ctx = c.getContext('2d');
                        ctx.clearRect(0, 0, c.width, c.height);
                        
                        // Scale the character down by 50% so tall assets fit in the canvas
                        ctx.save();
                        ctx.scale(0.5, 0.5);
                        
                        let skinIdx = pNum === 1 ? p1Skins[char] : p2Skins[char];
                        let dummy = new Player(c.width, c.height * 2 - 10, char, {}, skinIdx);
                        dummy.draw(ctx);
                        
                        ctx.restore();
                    }
                });
            });
        }
        
        window.onload = () => { drawPreviews(); requestAnimationFrame(loop); };

        function drawEnvironment(ctx) {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#1e293b');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#334155'; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.strokeStyle = '#475569'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width + 500; i += 100) { ctx.beginPath(); ctx.moveTo(i, groundY); ctx.lineTo(i - 100, canvas.height); ctx.stroke(); }
        }

        function updateUI() {
            document.getElementById('p1-title').innerText = `P1: ${p1.charType.toUpperCase()}`;
            document.getElementById('p2-title').innerText = `P2: ${p2.charType.toUpperCase()}`;

            document.getElementById('p1-hp').style.width = Math.max(0, (p1.hp / p1.maxHp) * 100) + '%';
            document.getElementById('p2-hp').style.width = Math.max(0, (p2.hp / p2.maxHp) * 100) + '%';

            document.getElementById('p1-ce').style.width = Math.max(0, (p1.ce / p1.maxCe) * 100) + '%';
            document.getElementById('p2-ce').style.width = Math.max(0, (p2.ce / p2.maxCe) * 100) + '%';

            document.getElementById('p1-ult').style.width = Math.max(0, (p1.ult / p1.maxUlt) * 100) + '%';
            document.getElementById('p2-ult').style.width = Math.max(0, (p2.ult / p2.maxUlt) * 100) + '%';
            
            const getCdStr = (cd) => cd > 0 ? `<span style="color:#ef4444; font-size:0.8em; margin-left: 8px;">[${(cd/1000).toFixed(1)}s]</span>` : '';

            const getLightNameStr = (p) => `<span style="color:#fbbf24; font-size:0.8em; margin-left: 8px;">[${p.lightNameProgress}/5 Name]</span>`;

                } else if (p.charType === 'sukuna') {

                    html += `Dismantle: <span class="key">${p.controls.a1.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a1])}<br>`;
                    html += `Cleave: <span class="key">${p.controls.a2.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a2])}<br>`;
                    html += `Rush: <span class="key">${p.controls.a3.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a3])}<br>`;

                } else if (p.charType === 'omniman') {

                    html += `Shockwave Clap: <span class="key">${p.controls.a2.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a2])}<br>`;

                    if (p.gutsStacks > 0 && !p.gutsUsedUlt) {

                                 </div>`;
                    }
                } else if (p.charType === 'saitama') {

                    let seriousStr = p.seriousness > 0 ? `<span style="color:${p.seriousness >= 100 ? '#facc15' : '#ef4444'}; font-size:0.8em; margin-left: 8px;">[Seriousness: ${Math.floor(p.seriousness)}%]</span>` : '';
                    html += `Normal Punch: <span class="key">${p.controls.a1.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a1])}${seriousStr}<br>`;

                    html += `Uppercut: <span class="key">${p.controls.a3.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a3])}<br>`;
                    html += `Serious Table Flip: <span class="key">${p.controls.a4.toUpperCase()}</span> ${p.saitamaUltPrimed ? '<span style="color:#22c55e">[PRIMED]</span>' : getUltReqStr(p)} ${getCdStr(p.cooldowns[p.controls.a4])}`;
                    if (p.seriousness > 0) {
                        html += `<div style="margin-top: 6px; width: 100%; background: rgba(0,0,0,0.8); height: 8px; border-radius: 4px; border: 1px solid #334155; overflow: hidden;">
                                    <div style="width: ${p.seriousness}%; height: 100%; background: ${p.seriousness >= 100 ? '#facc15' : '#ef4444'}; transition: width 0.1s linear;"></div>
                                 </div>`;
                    }
                } else if (p.charType === 'light') {
                    html += `Sacrifice HP (Passive): <span class="key">${pNum===1?'G':'L'}</span> ${getCdStr(p.cooldowns[p.controls.passive])}<br>`;
                    html += `Light Punch: <span class="key">${p.controls.a1.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a1])}<br>`;
                    html += `Book Toss: <span class="key">${p.controls.a2.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a2])}<br>`;
                    html += `Pencil Throw: <span class="key">${p.controls.a3.toUpperCase()}</span> ${getCdStr(p.cooldowns[p.controls.a3])}<br>`;
                    html += `Death Note: <span class="key">${p.controls.a4.toUpperCase()}</span> ${p.lightNameProgress < 5 ? getLightNameStr(p) : '<span style="color:#22c55e">[READY]</span>'} ${getCdStr(p.cooldowns[p.controls.a4])}`;
                }
                return html;
            };

            document.getElementById('p1-controls').innerHTML = genControls(p1, 1);
            document.getElementById('p2-controls').innerHTML = genControls(p2, 2);
        }

        let lastTime = 0;
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            if (dt > 32) dt = 32;

            if (gameState === 'countdown') {
                countdownTimer -= dt;
                
                p1.vx = 0; p2.vx = 0;
                p1.isBlocking = false; p2.isBlocking = false;
                [p1, p2].forEach(p => p.update(dt));

                if (countdownTimer <= 0) {
                    gameState = 'play';
                    fightTextTimer = 1000;
                }
            } else if (gameState === 'play') {

                // Clear controls for AI or Dummy so human inputs don't move them
                if (p1Mode > 0) Object.values(p1.controls).forEach(k => keys[k] = false);
                if (p2Mode > 0) Object.values(p2.controls).forEach(k => keys[k] = false);

                if (p1Mode === 1 && p1.hp > 0 && p1.stunTimer <= 0) {
                    updateAI(p1, p2, dt, 1);
                }
                if (p2Mode === 1 && p2.hp > 0 && p2.stunTimer <= 0) {
                    updateAI(p2, p1, dt, 2);
                }

                // Passives Checks First
                [p1, p2].forEach(p => {
                    if (keys[p.controls.passive] && (p.cooldowns[p.controls.passive]||0) <= 0 && p.hp > 0 && p.stunTimer <= 0 && p.ce >= p.getCost(p.controls.passive)) {
                        if (p.charType === 'sukuna') {
                            p.ce -= p.getCost(p.controls.passive);
                            p.hp = Math.min(p.maxHp, p.hp + 25);
                            p.cooldowns[p.controls.passive] = 10000; 
                            keys[p.controls.passive] = false; 
                            for(let i=0; i<20; i++) particles.push(new Particle(p.x + (Math.random()-0.5)*30, p.y - Math.random()*120, '#4ade80'));
                        } else if (p.charType === 'gojo') {
                            p.ce -= p.getCost(p.controls.passive);
                            p.cooldowns[p.controls.passive] = 5000;
                            let opponent = getOpponent(p);
                            let teleportSide = (p.x < opponent.x) ? 1 : -1;
                            p.x = opponent.x + teleportSide * 60;
                            if (p.x < 20) p.x = 20; if (p.x > canvas.width - 20) p.x = canvas.width - 20;
                            p.facing = (p.x < opponent.x) ? 1 : -1; p.y = opponent.y; p.aimAngle = p.facing === 1 ? 0 : Math.PI; p.teleportLock = 300;
                            for(let i=0; i<15; i++) particles.push(new Particle(p.x, p.y - 90, '#3b82f6')); keys[p.controls.passive] = false;
                        } else if (p.charType === 'omniman' && !p.isCasting && !p.isBlocking && !p.isDashing) {
                            p.startCast(p.controls.passive, 'omnifly'); keys[p.controls.passive] = false;
                        } else if (p.charType === 'guts') {
                            if (p.hasSword) {
                                p.startCast(p.controls.passive, 'gutsthrow'); keys[p.controls.passive] = false;
                            } else if (!p.hasSword && p.swordRef && p.swordRef.stuckInTarget) {
                                p.startCast(p.controls.passive, 'gutsretrieve'); keys[p.controls.passive] = false;
                            }
                        } else if (p.charType === 'saitama') {
                            p.ce -= p.getCost(p.controls.passive);
                            p.cooldowns[p.controls.passive] = 8000;
                            p.isCountering = true;
                            p.counterTimer = 1000; 
                            keys[p.controls.passive] = false;
                        } else if (p.charType === 'light') {
                            if (p.hp > 25 && p.lightNameProgress < 5) {
                                p.hp -= 25; 
                                p.addLightHit();
                                p.cooldowns[p.controls.passive] = 5000;
                                screenShake = 10;
                                for(let i=0; i<15; i++) particles.push(new Particle(p.x + (Math.random()-0.5)*30, p.y - Math.random()*90, '#000000'));
                            }
                            keys[p.controls.passive] = false;
                        }
                    }

                    // Stance logics
                    if (keys[p.controls.a4] && p.charType === 'saitama' && (p.cooldowns[p.controls.a4]||0) <= 0) {
                        if (!p.saitamaUltPrimed && p.ult >= p.maxUlt) {
                            p.saitamaUltPrimed = true; p.ult = 0; keys[p.controls.a4] = false;
                        } else if (p.saitamaUltPrimed) {
                            p.startCast(p.controls.a4, 'saitama_ult'); p.saitamaUltPrimed = false; keys[p.controls.a4] = false;
                        }
                    }
                });

                // Trigger Abilities & Dash
                [p1, p2].forEach(p => {
                    if (!p.isCasting && !p.isBlocking && !p.isDashing && p.stunTimer <= 0 && !p.lockedTo && p.hp > 0 && !p.saitamaUltPrimed) {
                        if (keys[p.controls.a1] && (p.cooldowns[p.controls.a1]||0) <= 0 && p.ce >= p.getCost(p.controls.a1) && (p.charType!=='guts'||p.hasSword)) p.startCast(p.controls.a1, p.charType==='gojo'?'fury':(p.charType==='sukuna'?'dismantle':(p.charType==='omniman'?'omnipunch':(p.charType==='saitama'?'saitama_punch':(p.charType==='light'?'light_punch':'gutsslash')))));
                        if (keys[p.controls.a2] && (p.cooldowns[p.controls.a2]||0) <= 0 && p.ce >= p.getCost(p.controls.a2)) p.startCast(p.controls.a2, p.charType==='gojo'?'blue':(p.charType==='sukuna'?'cleave':(p.charType==='omniman'?'omniclap':(p.charType==='saitama'?'saitama_consec':(p.charType==='light'?'light_book':'gutscannon')))));
                        if (keys[p.controls.a3] && (p.cooldowns[p.controls.a3]||0) <= 0 && p.ce >= p.getCost(p.controls.a3) && (p.charType!=='guts'||p.hasSword)) p.startCast(p.controls.a3, p.charType==='gojo'?'red':(p.charType==='sukuna'?'rush':(p.charType==='omniman'?'omnislam':(p.charType==='saitama'?'saitama_uppercut':(p.charType==='light'?'light_pencil':'gutsspin'))))); 
                        
                        if (keys[p.controls.a4] && (p.cooldowns[p.controls.a4]||0) <= 0 && p.ce >= p.getCost(p.controls.a4)) {
                            if (p.charType === 'light' && p.lightNameProgress >= 5) p.startCast(p.controls.a4, 'light_write');
                            else if (p.charType === 'guts' && p.hasSword) {
                                if (!p.gutsUsedUlt) p.startCast(p.controls.a4, 'gutsultslam');
                            }
                            else if (p.ult >= p.maxUlt && p.charType !== 'guts' && p.charType !== 'saitama' && p.charType !== 'light') p.startCast(p.controls.a4, p.charType==='gojo'?'purple':(p.charType==='sukuna'?'fuga':'omniult'));
                        }
                        
                        if (keys[p.controls.dash] && (p.cooldowns['dash']||0) <= 0) p.startDash();
                    }
                });

                [p1, p2].forEach(p => p.update(dt));

                // Game Over check explicitly ignoring dummies
                let isPracticeMode = isImmortality || p1Mode === 2 || p2Mode === 2;

                if (!isPracticeMode && (p1.hp <= 0 || p2.hp <= 0)) {
                    if (p1.charType !== 'dummy' && p2.charType !== 'dummy') {
                        gameState = 'gameover'; matchEndTimer = 0; showWinnerText = false;
                        matchWinner = p1.hp > 0 ? p1 : (p2.hp > 0 ? p2 : null);
                    }
                }
            } 
            else if (gameState === 'gameover') {
                matchEndTimer += dt;
                [p1, p2].forEach(p => p.update(dt));

                if (matchEndTimer >= 2500 && !showWinnerText) {
                    showWinnerText = true; screenShake = 40; 
                }
                if (matchEndTimer >= 5000) {
                    returnToSelect(); requestAnimationFrame(loop); return; 
                }
            }

            if (gameState === 'play' || gameState === 'gameover' || gameState === 'countdown') {
                if (gameState !== 'countdown') {
                    for (let i = projectiles.length - 1; i >= 0; i--) {
                        projectiles[i].update(dt);
                        if (!projectiles[i].active) projectiles.splice(i, 1);
                    }
                    
                    // Clashing Projectiles Logic (Hollow Purple vs Fuga)
                    for (let i = 0; i < projectiles.length; i++) {
                        let pA = projectiles[i];
                        if (pA.active && pA.constructor.name === 'HollowPurple' && pA.phase === 2) {
                            for (let j = 0; j < projectiles.length; j++) {
                                let pB = projectiles[j];
                                if (pB.active && pB.constructor.name === 'SukunaFuga' && pB.phase === 1) {
                                    let dx = pA.x - pB.arrowX;
                                    let dy = pA.y - pB.arrowY;
                                    if (Math.sqrt(dx*dx + dy*dy) < pA.purpleRadius + 20) {
                                        pA.active = false;
                                        pB.active = false;
                                        
                                        screenShake = 150;
                                        whiteBlindTimer = 5000;
                                        
                                        let cx = (pA.x + pB.arrowX) / 2;
                                        let cy = (pA.y + pB.arrowY) / 2;
                                        
                                        // Giant mixed explosion
                                        for(let k = 0; k < 300; k++) {
                                            let p = new Particle(cx, cy, Math.random() > 0.3 ? '#ffffff' : (Math.random() > 0.5 ? '#a855f7' : '#ea580c'));
                                            p.vx = (Math.random() - 0.5) * 120;
                                            p.vy = (Math.random() - 0.5) * 120;
                                            p.size = Math.random() * 50 + 10;
                                            p.decay = 0.004;
                                            particles.push(p);
                                        }
                                        
                                        p1.takeDamage(50, 3000, null, true, true);
                                        p2.takeDamage(50, 3000, null, true, true);
                                    }
                                }
                            }
                        }
                    }
                }
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update(dt);
                    if (particles[i].life <= 0) particles.splice(i, 1);
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawEnvironment(ctx);

                ctx.save();
                if (screenShake > 0) {
                    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                    screenShake *= 0.9; if(screenShake < 0.5) screenShake = 0;
                }

                [p1, p2].forEach(p => p.draw(ctx));
                projectiles.forEach(p => p.draw(ctx));
                particles.forEach(p => p.draw(ctx));

                ctx.restore();

                if (whiteBlindTimer > 0) { 
                    whiteBlindTimer -= dt;
                    let alpha = Math.min(1.0, whiteBlindTimer / 4000); 
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height); 
                } else if (flashAlpha > 0) { 
                    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height); 
                    flashAlpha -= 0.02; 
                }
                if (flashBlueAlpha > 0) { ctx.fillStyle = `rgba(147, 197, 253, ${flashBlueAlpha})`; ctx.fillRect(0, 0, canvas.width, canvas.height); flashBlueAlpha -= 0.04; }
                if (flashOrangeAlpha > 0) { ctx.fillStyle = `rgba(249, 115, 22, ${flashOrangeAlpha})`; ctx.fillRect(0, 0, canvas.width, canvas.height); flashOrangeAlpha -= 0.04; }
                if (flashRedAlpha > 0) { ctx.fillStyle = `rgba(239, 68, 68, ${flashRedAlpha})`; ctx.fillRect(0, 0, canvas.width, canvas.height); flashRedAlpha -= 0.04; }

                if (gameState === 'countdown') {
                    ctx.save();
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0,0,canvas.width, canvas.height);
                    let num = Math.ceil(countdownTimer / 1000);
                    let scale = 1 + (countdownTimer % 1000) / 1000;
                    
                    ctx.translate(canvas.width/2, canvas.height/2);
                    ctx.scale(scale, scale);
                    ctx.font = '900 120px "Segoe UI"';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.lineWidth = 8; ctx.strokeStyle = '#000'; ctx.strokeText(num, 0, 0);
                    ctx.fillStyle = '#fbbf24'; ctx.fillText(num, 0, 0);
                    ctx.restore();
                } else if (fightTextTimer > 0) {
                    fightTextTimer -= dt;
                    ctx.save();
                    let alpha = fightTextTimer / 1000;
                    ctx.globalAlpha = alpha;
                    ctx.translate(canvas.width/2, canvas.height/2);
                    let scale = 1 + (1 - alpha);
                    ctx.scale(scale, scale);
                    ctx.font = '900 120px "Segoe UI"';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.lineWidth = 8; ctx.strokeStyle = '#000'; ctx.strokeText("FIGHT!", 0, 0);
                    ctx.fillStyle = '#ef4444'; ctx.fillText("FIGHT!", 0, 0);
                    ctx.restore();
                    updateUI();
                } else if (gameState === 'gameover' && showWinnerText) {
                    ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                    let winText = "DRAW!"; let color = '#ffffff';
                    if (matchWinner === p1) { winText = "PLAYER 1 WINS!"; color = '#60a5fa'; }
                    else if (matchWinner === p2) { winText = "PLAYER 2 WINS!"; color = '#fca5a5'; }
                    let scale = Math.max(1, 3 - ((matchEndTimer - 2500) / 100));
                    ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(scale, scale);
                    ctx.font = '900 80px "Segoe UI"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.lineWidth = 12; ctx.strokeStyle = '#000000'; ctx.strokeText(winText, 0, 0);
                    ctx.fillStyle = color; ctx.fillText(winText, 0, 0); ctx.restore();
                } else { updateUI(); }
            }
            requestAnimationFrame(loop);
        }
    </script>
</body>
