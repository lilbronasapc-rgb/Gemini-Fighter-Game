<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen - 2 Player Fighter</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }

        /* HUD STYLES */
        .hud-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: none; 
            justify-content: space-between;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: white;
            z-index: 10;
        }
        .player-hud { width: 35%; }
        .p2-hud { text-align: right; }
        .title {
            font-size: 24px; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 6px;
        }
        .hp-bar-bg {
            width: 100%; height: 24px; background: rgba(0,0,0,0.7);
            border: 2px solid #334155; border-radius: 6px;
            overflow: hidden; margin-bottom: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .hp-bar-fill { height: 100%; transition: width 0.15s ease-out; }
        #p1-hp { background: #22c55e; width: 100%; }
        #p2-hp { background: #ef4444; width: 100%; float: right; }
        
        .ce-bar-bg {
            width: 100%; height: 10px; background: rgba(0,0,0,0.7);
            border: 2px solid #334155; border-radius: 4px; overflow: hidden; margin-bottom: 4px;
        }
        .ce-bar-fill { height: 100%; transition: width 0.1s linear; }
        #p1-ce { background: #3b82f6; width: 100%; }
        #p2-ce { background: #991b1b; width: 100%; float: right; }

        .ult-bar-bg {
            width: 100%; height: 6px; background: rgba(0,0,0,0.7);
            border: 1px solid #334155; border-radius: 4px; overflow: hidden; margin-bottom: 10px;
        }
        .ult-bar-fill { height: 100%; transition: width 0.1s linear; }
        #p1-ult { background: #d8b4fe; width: 0%; }
        #p2-ult { background: #fb923c; width: 0%; float: right; }

        .controls {
            font-size: 14px; color: #cbd5e1; line-height: 1.5;
            background: rgba(0, 0, 0, 0.6); padding: 10px 15px;
            border-radius: 8px; display: inline-block; text-align: left;
        }
        .key { color: #fbbf24; font-weight: bold; }

        /* CHARACTER SELECTOR STYLES */
        #selection-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20; color: white;
        }
        .select-container {
            display: flex; gap: 50px; margin-bottom: 20px; width: 90%; justify-content: center;
        }
        .select-box {
            background: #0f172a; border: 2px solid #334155; border-radius: 12px;
            padding: 20px; width: 45%; text-align: center;
        }
        .select-box h2 { margin-top: 0; margin-bottom: 15px; color: #cbd5e1; }
        .char-buttons {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
        }
        .char-btn {
            background: #1e293b; border: 2px solid #475569; border-radius: 8px;
            padding: 10px; cursor: pointer; transition: 0.2s; color: white;
            display: flex; flex-direction: column; align-items: center; width: 110px;
        }
        .char-btn canvas {
            width: 80px; height: 100px; background: #0f172a; border-radius: 4px; margin-bottom: 8px;
        }
        .char-btn:hover { border-color: #60a5fa; transform: translateY(-2px); }
        .char-btn.selected-p1 { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); }
        .char-btn.selected-p2 { border-color: #ef4444; background: rgba(239, 68, 68, 0.2); }
        
        .skin-label {
            margin-top: 8px; font-size: 11px; font-weight: bold; background: #334155; 
            padding: 4px 8px; border-radius: 4px; border: 1px solid #475569; 
            transition: 0.2s; color: white; width: 100%; box-sizing: border-box; text-align: center;
        }
        .skin-label:hover { background: #475569; transform: scale(1.05); }

        .game-options {
            display: flex; gap: 30px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        
        .toggle-label {
            font-size: 20px; color: #fca5a5; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .toggle-label input { width: 20px; height: 20px; cursor: pointer; }

        #start-btn {
            padding: 15px 40px; font-size: 24px; font-weight: bold; background: #22c55e;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            transition: 0.2s; display: none;
        }
        #start-btn:hover { background: #16a34a; transform: scale(1.05); }

        .ai-toggle-btn {
            color: white; border: 2px solid; 
            padding: 8px 16px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; width: 100%; transition: 0.2s; margin-bottom: 15px;
        }
        .ai-toggle-btn:hover { opacity: 0.8; }
        #btn-toggle-ai-p1 { background: #3b82f6; border-color: #60a5fa; }
        #btn-toggle-ai-p2 { background: #ef4444; border-color: #fca5a5; }
        
        #btn-exit-menu {
            pointer-events: auto; padding: 10px 20px; background: rgba(30, 41, 59, 0.8); 
            color: white; border: 2px solid #64748b; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }
        #btn-exit-menu:hover { background: rgba(51, 65, 85, 0.9); transform: scale(1.05); }

        .ai-settings {
            display: none; margin-bottom: 15px;
        }
        .ai-settings select {
            padding: 5px; border-radius: 4px; background: #1e293b; color: white; border: 1px solid #475569; outline: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- CHARACTER SELECTION -->
    <div id="selection-screen">
        <h1 style="font-size: 48px; color: #d8b4fe; margin-bottom: 30px; text-transform: uppercase;">Choose Your Fighters</h1>
        <div class="select-container">
            <div class="select-box" id="box-p1">
                <button id="btn-toggle-ai-p1" class="ai-toggle-btn" onclick="toggleAI(1)">Player 1 is: HUMAN</button>
                <div id="ai-settings-p1" class="ai-settings">
                    <label for="ai-difficulty-p1" style="margin-right: 10px;">Difficulty:</label>
                    <select id="ai-difficulty-p1">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard" selected>Hard</option>
                    </select>
                </div>
                <div class="char-buttons">
                    <button class="char-btn" onclick="selectChar(1, 'gojo')" id="btn-p1-gojo">
                        <canvas id="cvs-p1-gojo" width="80" height="100"></canvas>Satoru Gojo
                        <div class="skin-label" onclick="cycleSkin(event, 1, 'gojo')" id="skin-p1-gojo">Default</div>
                    </button>
                    <button class="char-btn" onclick="selectChar(1, 'sukuna')" id="btn-p1-sukuna">
                        <canvas id="cvs-p1-sukuna" width="80" height="100"></canvas>Ryomen Sukuna
                        <div class="skin-label" onclick="cycleSkin(event, 1, 'sukuna')" id="skin-p1-sukuna">Default</div>
                    </button>
                    <button class="char-btn" onclick="selectChar(1, 'omniman')" id="btn-p1-omniman">
                        <canvas id="cvs-p1-omniman" width="80" height="100"></canvas>Omni-Man
                        <div class="skin-label" onclick="cycleSkin(event, 1, 'omniman')" id="skin-p1-omniman">Default</div>
                    </button>
                    <button class="char-btn" onclick="selectChar(1, 'guts')" id="btn-p1-guts"><canvas id="cvs-p1-guts" width="80" height="100"></canvas>Guts</button>
                    <button class="char-btn" onclick="selectChar(1, 'saitama')" id="btn-p1-saitama"><canvas id="cvs-p1-saitama" width="80" height="100"></canvas>Saitama</button>
                    <button class="char-btn" onclick="selectChar(1, 'light')" id="btn-p1-light"><canvas id="cvs-p1-light" width="80" height="100"></canvas>Light Yagami</button>
                </div>
            </div>
            <div class="select-box" id="box-p2">
                <button id="btn-toggle-ai-p2" class="ai-toggle-btn" onclick="toggleAI(2)">Player 2 is: HUMAN</button>
                <div id="ai-settings-p2" class="ai-settings">
                    <label for="ai-difficulty-p2" style="margin-right: 10px;">Difficulty:</label>
                    <select id="ai-difficulty-p2">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard" selected>Hard</option>
                    </select>
                </div>
                <div class="char-buttons">
                    <button class="char-btn" onclick="selectChar(2, 'gojo')" id="btn-p2-gojo">
                        <canvas id="cvs-p2-gojo" width="80" height="100"></canvas>Satoru Gojo
                        <div class="skin-label" onclick="cycleSkin(event, 2, 'gojo')" id="skin-p2-gojo">Default</div>
                    </button>
                    <button class="char-btn" onclick="selectChar(2, 'sukuna')" id="btn-p2-sukuna">
                        <canvas id="cvs-p2-sukuna" width="80" height="100"></canvas>Ryomen Sukuna
                        <div class="skin-label" onclick="cycleSkin(event, 2, 'sukuna')" id="skin-p2-sukuna">Default</div>
                    </button>
                    <button class="char-btn" onclick="selectChar(2, 'omniman')" id="btn-p2-omniman">
                        <canvas id="cvs-p2-omniman" width="80" height="100"></canvas>Omni-Man
                        <div class="skin-label" onclick="cycleSkin(event, 2, 'omniman')" id="skin-p2-omniman">Default</div>
                    </button>
                    <button class="char-btn" onclick="selectChar(2, 'guts')" id="btn-p2-guts"><canvas id="cvs-p2-guts" width="80" height="100"></canvas>Guts</button>
                    <button class="char-btn" onclick="selectChar(2, 'saitama')" id="btn-p2-saitama"><canvas id="cvs-p2-saitama" width="80" height="100"></canvas>Saitama</button>
                    <button class="char-btn" onclick="selectChar(2, 'light')" id="btn-p2-light"><canvas id="cvs-p2-light" width="80" height="100"></canvas>Light Yagami</button>
                </div>
            </div>
        </div>
        <div class="game-options">
            <label class="toggle-label">
                <input type="checkbox" id="immortality-toggle"> Immortality Mode (Sandbox)
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="no-cd-toggle"> No Cooldowns
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="double-dmg-toggle"> 2x Damage
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="double-hp-toggle"> 2x HP
            </label>
        </div>
        <button id="start-btn" onclick="startGame()">FIGHT!</button>
    </div>

    <!-- HUD -->
    <div class="hud-container" id="hud">
        <div class="player-hud">
            <div class="title" id="p1-title" style="color: #60a5fa;">P1</div>
            <div class="hp-bar-bg"><div id="p1-hp" class="hp-bar-fill"></div></div>
            <div class="ce-bar-bg"><div id="p1-ce" class="ce-bar-fill"></div></div>
            <div class="ult-bar-bg"><div id="p1-ult" class="ult-bar-fill"></div></div>
            <div class="controls" id="p1-controls" style="border-left: 4px solid #3b82f6;"></div>
        </div>
        <div class="player-hud p2-hud">
            <div class="title" id="p2-title" style="color: #fca5a5;">P2</div>
            <div class="hp-bar-bg"><div id="p2-hp" class="hp-bar-fill"></div></div>
            <div class="ce-bar-bg"><div id="p2-ce" class="ce-bar-fill"></div></div>
            <div class="ult-bar-bg"><div id="p2-ult" class="ult-bar-fill"></div></div>
            <div class="controls" id="p2-controls" style="border-right: 4px solid #ef4444;"></div>
        </div>
    </div>
    
    <!-- Top Menu Bar for Practice/Dummy Mode -->
    <div id="top-menu-bar" style="display:none; position: absolute; top: 20px; width: 100%; text-align: center; z-index: 50; pointer-events: none;">
        <button id="btn-exit-menu" onclick="returnToSelect()">EXIT TO MENU</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Physics & Game Constants
        const GRAVITY = 0.002;
        const JUMP_FORCE = 0.7;
        const MOVE_SPEED = 0.35;
        let groundY = 0;

        // Visual Effects Globals
        let screenShake = 0;
        let flashAlpha = 0;
        let flashBlueAlpha = 0;
        let flashOrangeAlpha = 0;
        let flashRedAlpha = 0;
        let whiteBlindTimer = 0;

        let gameState = 'select'; 
        let selectedP1 = null;
        let selectedP2 = null;
        let p1Mode = 0; // 0 = Human, 1 = AI, 2 = Dummy
        let p2Mode = 0;
        let isImmortality = false;
        let isNoCooldowns = false;
        let isDoubleDamage = false;
        let isDoubleHP = false;
        
        let matchEndTimer = 0;
        let showWinnerText = false;
        let matchWinner = null;

        let countdownTimer = 0;
        let fightTextTimer = 0;

        // --- Skins System ---
        const CHAR_SKINS = {
            gojo: ['Default', 'Shinjuku'],
            sukuna: ['Default', 'Meguna'],
            omniman: ['Default', 'Invincible', 'Thragg', 'Conquest'],
            guts: ['Default'],
            saitama: ['Default'],
            light: ['Default'],
            dummy: ['Default']
        };
        let p1Skins = { gojo: 0, sukuna: 0, omniman: 0, guts: 0, saitama: 0, light: 0, dummy: 0 };
        let p2Skins = { gojo: 0, sukuna: 0, omniman: 0, guts: 0, saitama: 0, light: 0, dummy: 0 };

        function cycleSkin(e, playerNum, charName) {
            e.stopPropagation(); // Don't trigger character select
            let skinsObj = playerNum === 1 ? p1Skins : p2Skins;
            let skinsList = CHAR_SKINS[charName];
            skinsObj[charName] = (skinsObj[charName] + 1) % skinsList.length;
            let lbl = document.getElementById(`skin-p${playerNum}-${charName}`);
            if(lbl) lbl.innerText = skinsList[skinsObj[charName]];
            drawPreviews();
        }

        // Resize Handling
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 80;
            if (p1 && p1.y > groundY) p1.y = groundY;
            if (p2 && p2.y > groundY) p2.y = groundY;
        }
        window.addEventListener('resize', resize);

        // Input Tracking
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            keys[e.key] = true; 
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            keys[e.key] = false;
        });

        function rectIntersectCircle(rx, ry, rw, rh, cx, cy, cr) {
            let testX = cx; let testY = cy;
            if (cx < rx) testX = rx; else if (cx > rx + rw) testX = rx + rw;
            if (cy < ry) testY = ry; else if (cy > ry + rh) testY = ry + rh;
            let distX = cx - testX; let distY = cy - testY;
            return Math.sqrt((distX * distX) + (distY * distY)) <= cr;
        }
        function rectIntersectRect(r1x, r1y, r1w, r1h, r2x, r2y, r2w, r2h) {
            return r1x < r2x + r2w && r1x + r1w > r2x && r1y < r2y + r2h && r1h + r1y > r2y;
        }

        function getOpponent(caster) { return caster === p1 ? p2 : p1; }

        // --- Visual Systems ---
        let particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 6; this.vy = (Math.random() - 0.5) * 6;
                this.life = 1.0; this.color = color;
                this.size = Math.random() * 5 + 2; this.decay = Math.random() * 0.02 + 0.01;
                this.isCube = false;
                this.rot = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.2;
            }
            update(dt) { 
                this.x += this.vx; this.y += this.vy; this.life -= this.decay; 
                if (this.isCube) this.rot += this.rotSpeed;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
                ctx.beginPath(); 
                if (this.isCube) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rot);
                    ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.fill();
                    ctx.restore();
                } else {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }
        }

        function drawGlowCircle(ctx, x, y, radius, color, glowColor) {
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color; ctx.shadowColor = glowColor; ctx.shadowBlur = 25; ctx.fill(); ctx.shadowBlur = 0; 
        }

        // --- Gojo Abilities ---
        class HollowPurple {
            constructor(caster, angle) {
                this.caster = caster;
                this.angle = angle;
                this.dir = caster.facing;
                this.x = caster.x + Math.cos(this.angle) * 15;
                this.y = caster.y - 90 + Math.sin(this.angle) * 15; 
                this.phase = 0;
                this.timer = 0;
                this.targetX = this.x + Math.cos(this.angle) * 50;
                this.targetY = this.y + Math.sin(this.angle) * 50;
                
                let separation = 45;
                this.redX = this.targetX - Math.cos(this.angle) * separation; 
                this.redY = this.targetY - Math.sin(this.angle) * separation;
                this.blueX = this.targetX + Math.cos(this.angle) * separation; 
                this.blueY = this.targetY + Math.sin(this.angle) * separation;
                
                this.purpleRadius = 0;
                this.speed = 22;
                this.active = true;
                this.hasHit = new Set();
            }
            update(dt) {
                this.timer += dt;
                
                if (this.phase === 0 || this.phase === 1) {
                    this.angle = this.caster.aimAngle;
                    this.dir = this.caster.facing;
                }

                if (this.phase === 0) {
                    screenShake = Math.max(screenShake, 3); 
                    
                    this.targetX = this.caster.x + Math.cos(this.angle) * 50;
                    this.targetY = this.caster.y - 90 + Math.sin(this.angle) * 50;

                    let separation = 45 * (1 - (this.timer / 1500)); 
                    
                    let prefRedX = this.targetX - Math.cos(this.angle) * separation;
                    let prefRedY = this.targetY - Math.sin(this.angle) * separation;
                    let prefBlueX = this.targetX + Math.cos(this.angle) * separation;
                    let prefBlueY = this.targetY + Math.sin(this.angle) * separation;

                    this.redX += (prefRedX - this.redX) * 0.15; this.redY += (prefRedY - this.redY) * 0.15;
                    this.blueX += (prefBlueX - this.blueX) * 0.15; this.blueY += (prefBlueY - this.blueY) * 0.15;

                    if(Math.random() > 0.5) particles.push(new Particle(this.redX, this.redY, '#ef4444'));
                    if(Math.random() > 0.5) particles.push(new Particle(this.blueX, this.blueY, '#3b82f6'));
                    
                    if (this.timer >= 1500) {
                        this.phase = 1; this.timer = 0; this.x = this.targetX; this.y = this.targetY; screenShake = 18; 
                    }
                } else if (this.phase === 1) {
                    screenShake = Math.max(screenShake, 6);
                    this.purpleRadius = Math.min(60, (this.timer / 800) * 60);
                    
                    this.x = this.caster.x + Math.cos(this.angle) * 50;
                    this.y = this.caster.y - 90 + Math.sin(this.angle) * 50;

                    let randAngle = Math.random() * Math.PI * 2;
                    particles.push(new Particle(this.x + Math.cos(randAngle)*80, this.y + Math.sin(randAngle)*80, '#a855f7'));
                    
                    if (this.timer >= 1000) {
                        this.phase = 2; this.timer = 0; flashAlpha = 1.0; screenShake = 35; 
                    }
                } else if (this.phase === 2) {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;

                    for(let i=0; i<3; i++) {
                        let p = new Particle(this.x + (Math.random()-0.5)*this.purpleRadius*1.5, this.y + this.purpleRadius, '#475569'); 
                        p.vy = -Math.random()*4 - 1; p.vx = (Math.random()-0.5)*2; p.size = Math.random()*6 + 3; p.decay = 0.03;
                        particles.push(p);
                    }
                    for(let i=0; i<4; i++) {
                        particles.push(new Particle(this.x + (Math.random()-0.5)*40, this.y + (Math.random()-0.5)*40, '#a855f7'));
                        particles.push(new Particle(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20, '#ffffff'));
                    }

                    let opponent = getOpponent(this.caster);
                    if (this.active && rectIntersectCircle(opponent.x - 15, opponent.y - 140, 30, 140, this.x, this.y, this.purpleRadius)) {
                        if (!this.hasHit.has(opponent)) {
                            if (opponent.takeDamage(30, 1500, this.caster, true)) opponent.vx = Math.cos(this.angle) * 2.0; 
                            this.hasHit.add(opponent);
                        }
                    }
                    if (this.x < -200 || this.x > canvas.width + 200 || this.y < -200 || this.y > canvas.height + 200) this.active = false;
                }
            }
            draw(ctx) {
                if (!this.active) return;
                ctx.save(); ctx.globalCompositeOperation = 'lighter'; 
                if (this.phase === 0) {
                    drawGlowCircle(ctx, this.redX, this.redY, 12, '#ef4444', '#fca5a5');
                    drawGlowCircle(ctx, this.blueX, this.blueY, 12, '#3b82f6', '#93c5fd');
                } else if (this.phase === 1 || this.phase === 2) {
                    drawGlowCircle(ctx, this.x, this.y, this.purpleRadius, '#a855f7', '#d8b4fe');
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.purpleRadius * 0.45, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        class LapseBlue {
            constructor(caster) {
                this.caster = caster; this.dir = caster.facing;
                this.x = caster.x + this.dir * 40; this.y = caster.y - 90; 
                this.timer = 0; this.active = true; this.hasHit = false;
                this.rectWidth = 375; // Decreased range by 25% (was 500)
                this.rectHeight = 100;
            }
            update(dt) {
                this.timer += dt; 
                this.dir = this.caster.facing; 
                this.x = this.caster.x + this.dir * 40; 
                
                if (this.timer > 300 && this.timer < 700) {

                    for(let i=0; i<20; i++) particles.push(new Particle(this.caster.x + this.caster.facing*30, this.caster.y - 70, '#ef4444'));
                    this.active = false;
                }
            }
            draw(ctx) {
            }
        }

        // --- Light Yagami Abilities ---
        class LightPunch {
            constructor(caster) {
                this.caster = caster; this.timer = 0; this.active = true;
                this.opponent = getOpponent(caster); this.hasHit = false;
            }
            update(dt) {
                this.timer += dt;
                if (this.timer > 50 && !this.hasHit) {
                    let dir = this.caster.facing;
                    let px = this.caster.x + dir * 30;
                    if (Math.abs(px - this.opponent.x) < 40 && Math.abs(this.caster.y - this.opponent.y) < 60) {
                        if (this.opponent.takeDamage(1, 500, this.caster)) {
                            this.opponent.vx = dir * 1.0; 
                            this.caster.addLightHit();
                        }
                        this.hasHit = true;
                    }
                }
                if (this.timer > 150) this.active = false;
            }
            draw(ctx) {
                if (!this.active || this.timer > 100) return;
                ctx.save(); let dir = this.caster.facing;
                ctx.fillStyle = '#d4a373'; ctx.fillRect(this.caster.x, this.caster.y - 95, dir * 40, 10);
                ctx.restore();
            }
        }

        class LightBook {
            constructor(caster) {
                this.caster = caster; this.dir = caster.facing;
                this.x = caster.x + this.dir * 30; this.y = caster.y - 100;
                this.vx = this.dir * 8; this.vy = -6;
                this.active = true; this.hasHit = false; this.opponent = getOpponent(caster);
            }
            update(dt) {
                this.vy += GRAVITY * dt * dt;
                this.x += this.vx; this.y += this.vy;
                
                if (!this.hasHit && rectIntersectRect(this.opponent.x-15, this.opponent.y-140, 30, 140, this.x-15, this.y-15, 30, 30)) {
                    if (this.opponent.takeDamage(1, 500, this.caster)) {
                        this.opponent.vx = this.dir * 1.5;
                        this.caster.addLightHit();
                    }
                    this.hasHit = true; this.active = false;
                }
                if (this.y >= groundY || this.x < -100 || this.x > canvas.width + 100) this.active = false;
            }
            draw(ctx) {
                if (!this.active) return;
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate((Date.now()%1000)/1000 * Math.PI * 2);
                ctx.fillStyle = '#020617'; ctx.fillRect(-15, -10, 30, 20);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(-12, -8, 24, 16);
                ctx.restore();
            }
        }

        class LightPencil {
            constructor(caster) {
                this.caster = caster; this.dir = caster.facing;
                this.x = caster.x + this.dir * 30; this.y = caster.y - 90;
                this.vx = this.dir * 18;
                this.active = true; this.hasHit = false; this.opponent = getOpponent(caster);
            }
            update(dt) {
                this.x += this.vx;
                if (!this.hasHit && rectIntersectRect(this.opponent.x-15, this.opponent.y-140, 30, 140, this.x-10, this.y-2, 20, 4)) {
                    if (this.opponent.takeDamage(1, 500, this.caster)) {
                        this.opponent.vx = this.dir * 0.5;
                        this.caster.addLightHit();
                    }
                    this.hasHit = true; this.active = false;
                }
                if (this.x < -100 || this.x > canvas.width + 100) this.active = false;
            }
            draw(ctx) {
                if (!this.active) return;
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = '#facc15'; ctx.fillRect(this.dir === 1 ? -10 : 10, -2, this.dir === 1 ? 20 : -20, 4);
                ctx.fillStyle = '#000000'; ctx.fillRect(this.dir === 1 ? 10 : -10, -2, this.dir === 1 ? 2 : -2, 4);
                ctx.restore();
            }
        }

        class LightWrite {
            constructor(caster) {
                this.caster = caster; this.timer = 0; this.active = true;
                this.opponent = getOpponent(caster);
                screenShake = 5;
            }
            update(dt) {
                this.timer += dt;
                
                // Fix: Ensure the cast isn't interrupted perfectly on the final frame
                if (this.timer < 1500 && (!this.caster.isCasting || this.caster.castType !== 'light_write')) { 
                    this.active = false; return; 
                }
                
                if(Math.random() < 0.2) {
                    particles.push(new Particle(this.caster.x + (Math.random()-0.5)*40, this.caster.y - 100 + (Math.random()-0.5)*40, '#000000'));
                }

                if (this.timer >= 1500) {
                    screenShake = 50; flashRedAlpha = 1.0;
                    this.opponent.takeDamage(100, 3000, this.caster, true); // Instakill
                    for(let i=0; i<30; i++) {
                        let p = new Particle(this.opponent.x, this.opponent.y - 70, '#991b1b');
                        p.vx = (Math.random() - 0.5) * 15; p.vy = (Math.random() - 0.5) * 15; p.size = Math.random()*8+4;
                        particles.push(p);
                    }
                    this.active = false;
                }
            }
            draw(ctx) {
                if (!this.active) return;
                ctx.save();
                ctx.translate(this.caster.x + this.caster.facing * 30, this.caster.y - 95);
                ctx.fillStyle = '#020617'; ctx.fillRect(-10, -15, 20, 30);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(-8, -13, 16, 26);
                ctx.restore();
            }
        }

        // --- Player System ---
        class Player {
            constructor(x, y, type, controls, skinIdx = 0) {
                this.x = x; this.y = y; this.charType = type; this.controls = controls;
                this.spawnX = x; this.spawnY = y;
                this.skinName = CHAR_SKINS[type] ? (CHAR_SKINS[type][skinIdx] || 'Default') : 'Default';
                this.vx = 0; this.vy = 0; this.facing = 1; this.onGround = false; this.aimAngle = 0;
                
                this.maxHp = type === 'light' ? 50 : 100;
                if (isDoubleHP) this.maxHp *= 2;
                this.hp = this.maxHp;
                
                this.maxCe = type === 'gojo' ? 1000 : (type === 'omniman' ? 1000 : 2000);
                if (type === 'saitama') this.maxCe = 1000;
                if (type === 'light') this.maxCe = 100; 
                this.ce = this.maxCe;
                this.maxUlt = 100; this.ult = 0;

                if (type === 'dummy') {
                    this.maxHp = 100;
                    if (isDoubleHP) this.maxHp *= 2;
                    this.hp = this.maxHp;
                    this.maxCe = 100;
                    this.ce = 0;
                    this.maxUlt = 100;
                    this.ult = 0;
                }

                this.walkTime = 0;
                this.isCasting = false; this.castType = null; this.activeCastKey = null; 
                this.castTimer = 0; this.castDuration = 0;
                
                this.isBlocking = false; this.isDashing = false; this.dashTimer = 0;
                this.stunTimer = 0; this.hitTimer = 0; this.deadTimer = 0; this.lockedTo = null; 
                this.isInvincible = false;
                
                // Guts Specifics
                this.hasSword = true; this.swordRef = null;
                this.gutsStacks = 0; this.gutsStackTimer = 0;
                this.gutsUsedUlt = false;

                // Saitama Specifics
                this.saitamaUltPrimed = false;
                this.isCountering = false;
                this.counterTimer = 0;
                this.seriousness = 0; // 0 to 100
                this.seriousnessTimer = 0;

                // Light Specifics
                this.lightNameProgress = 0;

                this.exploded = false;
                this.cooldowns = {};
                this.teleportLock = 0;
                this.danceType = null;
            }

            isCastingUlt() {
                return this.isCasting && ['purple', 'fuga', 'omniult', 'gutsultslam', 'saitama_ult', 'light_write'].includes(this.castType);
            }

            addLightHit() {
                if (this.charType === 'light' && this.lightNameProgress < 5) {
                    this.lightNameProgress++;
                    this.ult = (this.lightNameProgress / 5) * this.maxUlt;
                }
            }

            addGutsStack() {
                if (this.charType === 'guts' && !this.gutsUsedUlt) {
                    this.gutsStacks = Math.min(5, (this.gutsStacks || 0) + 1);
                    this.gutsStackTimer = 4000; // Increased stack reset timer to 4 seconds
                }
            }

            getCost(key) {
                if (key === this.controls.passive) {
                    if (this.charType === 'gojo') return 50;
                    if (this.charType === 'guts') return this.hasSword ? 50 : 0;
                    if (this.charType === 'saitama') return 50;
                    return 0; 
                }
                if (this.charType === 'gojo') {
                    if (key === this.controls.a1) return 20; if (key === this.controls.a2) return 30;    
                    if (key === this.controls.a3) return 50; if (key === this.controls.a4) return 100;   
                } else if (this.charType === 'sukuna') {
                    if (key === this.controls.a1) return 150; if (key === this.controls.a2) return 200;  
                    if (key === this.controls.a3) return 300; if (key === this.controls.a4) return 500;  
                } else if (this.charType === 'omniman') {
                    if (key === this.controls.a1) return 50; if (key === this.controls.a2) return 80;  
                    if (key === this.controls.a3) return 100; if (key === this.controls.a4) return 200;  
                } else if (this.charType === 'guts') {
                    if (key === this.controls.a1) return 150; if (key === this.controls.a2) return 150;
                    if (key === this.controls.a3) return 250; if (key === this.controls.a4) return 0; 
                } else if (this.charType === 'saitama') {
                    if (key === this.controls.a1) return 30; if (key === this.controls.a2) return 50;
                    if (key === this.controls.a3) return 20; if (key === this.controls.a4) return 0; 
                } else if (this.charType === 'light') {
                    return 5; 
                }
                return 0;
            }

            startDash() {
                this.isDashing = true; this.dashTimer = 200; this.cooldowns['dash'] = 1000; this.vy = 0;
            }

            startCast(key, type) {
                this.isCasting = true; this.castType = type; this.activeCastKey = key;
                this.castTimer = 0; this.vx = 0;
                
                if (type === 'purple' || type === 'rush' || type === 'light_write') this.vy = 0; 
                
                let dx = 0; let dy = 0;
                if (keys[this.controls.right]) dx = 1; if (keys[this.controls.left]) dx = -1;
                if (keys[this.controls.up]) dy = -1; if (keys[this.controls.down]) dy = 1;
                
                if (dx !== 0) this.facing = dx;
                if (!this.onGround && (dx !== 0 || dy !== 0)) { this.aimAngle = Math.atan2(dy, dx); } 
                else { this.aimAngle = this.facing === 1 ? 0 : Math.PI; }
                
                let dur = 1000, cd = 5000;
                
                // Gojo
                if (type === 'purple') { dur = 2600; cd = 20000; projectiles.push(new HollowPurple(this, this.aimAngle)); }
                else if (type === 'blue') { dur = 600; cd = 5000; projectiles.push(new LapseBlue(this)); }
                else if (type === 'red') { dur = 1200; cd = 10000; projectiles.push(new ReversalRed(this)); }
                else if (type === 'fury') { dur = 2500; cd = 7500; projectiles.push(new GojoFury(this)); }
                // Sukuna
                else if (type === 'fuga') { dur = 2600; cd = 15000; projectiles.push(new SukunaFuga(this, this.aimAngle)); }
                else if (type === 'dismantle') { dur = 800; cd = 5000; projectiles.push(new SukunaDismantle(this, this.aimAngle)); } 
                else if (type === 'cleave') { dur = 600; cd = 8000; projectiles.push(new SukunaCleave(this)); } 
                else if (type === 'rush') { dur = 1000; cd = 12000; projectiles.push(new SukunaRush(this)); } 
                // Omni-Man
                else if (type === 'omnipunch') { dur = 300; cd = 5000; projectiles.push(new OmniPunch(this)); }
                else if (type === 'omniclap') { dur = 400; cd = 6000; projectiles.push(new OmniClap(this)); }
                else if (type === 'omnislam') { dur = 1000; cd = 8000; projectiles.push(new OmniSlam(this)); }
                else if (type === 'omniult') { dur = 999999; cd = 15000; projectiles.push(new OmniCrash(this)); } 
                else if (type === 'omnifly') { dur = 300; cd = 7500; this.vy = 0; } 
                // Guts (+10000ms to all normal cooldowns!)
                else if (type === 'gutsthrow') { dur = 400; cd = 15000; this.hasSword = false; this.swordRef = new GutsSword(this); projectiles.push(this.swordRef); }
                else if (type === 'gutsretrieve') { dur = 300; cd = 15000; projectiles.push(new GutsRetrieveDash(this)); }
                else if (type === 'gutsslash') { dur = 500; cd = 15000; projectiles.push(new GutsSlash(this)); }
                else if (type === 'gutscannon') { dur = 600; cd = 16000; projectiles.push(new GutsCannon(this)); }
                else if (type === 'gutsspin') { dur = 2200; cd = 20000; projectiles.push(new GutsSpin(this)); }
                else if (type === 'gutsultslam') { dur = 1000; cd = 15000; projectiles.push(new GutsUltSlam(this)); this.gutsUsedUlt = true; }
                // Saitama
                else if (type === 'saitama_punch') { dur = 300; cd = 4000; projectiles.push(new SaitamaPunch(this)); }
                else if (type === 'saitama_consec') { dur = 2500; cd = 8000; projectiles.push(new SaitamaConsecutive(this)); }
                else if (type === 'saitama_uppercut') { dur = 300; cd = 5000; projectiles.push(new SaitamaUppercut(this)); }
                else if (type === 'saitama_ult') { dur = 1000; cd = 15000; projectiles.push(new SaitamaSeriousTableFlip(this)); } 
                // Light
                else if (type === 'light_punch') { dur = 300; cd = 2000; projectiles.push(new LightPunch(this)); }
                else if (type === 'light_book') { dur = 400; cd = 3000; projectiles.push(new LightBook(this)); }
                else if (type === 'light_pencil') { dur = 400; cd = 2500; projectiles.push(new LightPencil(this)); }
                else if (type === 'light_write') { dur = 1500; cd = 10000; projectiles.push(new LightWrite(this)); }

                if (type === 'purple' || type === 'fuga' || type === 'omniult') this.ult = 0;
                if (type === 'light_write') { this.lightNameProgress = 0; this.ult = 0; }

                this.castDuration = dur; this.cooldowns[key] = cd; this.ce -= this.getCost(key);
            }

            takeDamage(amt, stunDur = 1500, attacker = null, isUlt = false, bypassCounter = false, blockMitigation = 0.5) {
                if (this.hp <= 0 || this.isInvincible || this.isCastingUlt()) return false;

                if (isDoubleDamage) amt *= 2;
                if (isImmortality) amt = 0;

                // Saitama Passive Counter check
                if (this.isCountering && !bypassCounter) {
                    this.isCountering = false; this.counterTimer = 0;
                    let opp = attacker || getOpponent(this);
                    
                    let tpSide = opp.facing * -1;
                    this.x = opp.x + tpSide * 60;
                    if(this.x < 20) this.x = 20; if(this.x > canvas.width - 20) this.x = canvas.width - 20;
                    this.y = opp.y;
                    this.facing = this.x < opp.x ? 1 : -1;
                    
                    this.isCasting = true;
                    this.castType = 'saitama_counter_punch';
                    this.castTimer = 0;
                    this.castDuration = 1000;
                    this.vx = 0; this.vy = 0;
                    
                    opp.stunTimer = 1000;
                    opp.vx = 0;
                    
                    projectiles.push(new SaitamaCounterHit(this, opp));

                    return false; 
                }
                
                let damage = amt;
                let unblockable = isUlt && (!attacker || attacker.charType === 'gojo' || attacker.charType === 'omniman' || attacker.charType === 'guts' || attacker.charType === 'light');

                if (this.isBlocking && !unblockable) {
                    damage = amt * blockMitigation; 
                    stunDur = stunDur * blockMitigation; 
                    for(let i=0; i<5; i++) particles.push(new Particle(this.x + this.facing*20, this.y - 50, '#93c5fd'));
                } else {
                    for(let i=0; i<15; i++) particles.push(new Particle(this.x, this.y - 90, '#ef4444'));
                }
                
                this.hp -= damage; this.hitTimer = 200; this.stunTimer = stunDur;
                
                if (this.charType === 'saitama') {
                    let hpRatio = Math.max(0, this.hp / this.maxHp);
                    let hpMultiplier = 1.0 + ((1.0 - hpRatio) * 2.0); // Buffed: Up to 3x faster buildup at low HP (was 2.5x)
                    let seriousnessIncrease = Math.max(8, damage * 1.5) * hpMultiplier; // Buffed: higher minimum and damage scaling
                    
                    this.seriousness = Math.min(100, (this.seriousness || 0) + seriousnessIncrease);
                    this.seriousnessTimer = 2500;
                }

                if (!this.isBlocking || unblockable) {
                    this.isCasting = false; this.castType = null; this.activeCastKey = null; this.lockedTo = null; this.isDashing = false;
                }

                if (attacker && !isUlt && attacker.charType !== 'light' && this.charType !== 'dummy') {
                    attacker.ult = Math.min(attacker.maxUlt, attacker.ult + damage * 2.0); 
                } else if (attacker && attacker.charType !== 'light' && this.charType === 'dummy') {
                    attacker.ult = Math.min(attacker.maxUlt, attacker.ult + damage * 4.0); // Faster ult charge on dummy
                }

                if (this.hp <= 0) { 
                    if (this.charType === 'dummy') {
                        this.hp = this.maxHp;
                        this.x = this.spawnX;
                        this.y = this.spawnY;
                        this.vx = 0;
                        this.vy = 0;
                        for(let i=0; i<15; i++) particles.push(new Particle(this.x + (Math.random()-0.5)*30, this.y - 60 + (Math.random()-0.5)*40, '#22c55e'));
                    } else if (!isImmortality) {
                        this.hp = 0; 
                        this.deadTimer = 5000; 
                        if (attacker && attacker.charType === 'omniman' && !this.exploded) {
                            this.exploded = true;
                            screenShake = 20;
                            for(let i=0; i<80; i++) {
                                let p = new Particle(this.x, this.y - 45, '#991b1b');
                                p.vx = (Math.random()-0.5)*20; p.vy = (Math.random()-0.5)*20; p.size = Math.random()*8+4; p.decay = 0.005;
                                particles.push(p);
                            }
                        }
                    }
                }
                return true;
            }

            resolveGround() {
                if (this.y >= groundY) { this.y = groundY; this.vy = 0; this.onGround = true; } 
                else { this.onGround = false; }
                if (this.x < 20) { this.x = 20; this.vx = 0; }
                if (this.x > canvas.width - 20) { this.x = canvas.width - 20; this.vx = 0; }
            }

            update(dt) {
                if (isNoCooldowns) {
                    this.ce = this.maxCe;
                    this.ult = this.maxUlt;
                    if (this.charType === 'light') this.lightNameProgress = 5;
                    if (this.charType === 'guts') {
                        this.gutsUsedUlt = false;
                        this.gutsStacks = 5;
                    }
                    for (let key in this.cooldowns) this.cooldowns[key] = 0;
                } else {
                    this.ce = Math.min(this.maxCe, this.ce + dt * 0.08);
                    for (let key in this.cooldowns) { if (this.cooldowns[key] > 0) this.cooldowns[key] -= dt; }
                }
                
                if (this.hitTimer > 0) this.hitTimer -= dt;

                if (this.counterTimer > 0) {
                    this.counterTimer -= dt;
                    if (this.counterTimer <= 0) this.isCountering = false;
                    particles.push(new Particle(this.x + (Math.random()-0.5)*40, this.y - Math.random()*120, '#fef08a'));
                }

                if (this.charType === 'guts') {
                    if (this.gutsStackTimer > 0) {
                        this.gutsStackTimer -= dt;
                        if (this.gutsStackTimer <= 0) this.gutsStacks = 0;
                    }
                }

                if (this.charType === 'saitama') {
                    if (this.stunTimer <= 0) {
                        if (this.seriousnessTimer > 0) {
                            this.seriousnessTimer -= dt;
                            if (this.seriousnessTimer <= 0) this.seriousness = 0; 
                        }
                    } else {
                        this.seriousnessTimer = 2500; // Pause timer while stunned
                    }
                    
                    if (this.seriousness > 0 && Math.random() < this.seriousness / 300) {
                        let isMax = this.seriousness >= 100;
                        let color = isMax ? (Math.random() > 0.5 ? '#facc15' : '#fef08a') : '#ef4444';
                        let p = new Particle(this.x + (Math.random()-0.5)*40, this.y - Math.random()*100, color);
                        p.vy = -Math.random() * (isMax ? 4 : 2) - 1;
                        if (isMax) p.size *= 1.5;
                        particles.push(p);
                    }
                }

                if (this.hp <= 0 && !isImmortality) {
                    this.isCasting = false; this.isBlocking = false; this.isDashing = false;
                    this.resolveGround(); return;
                }

                if (gameState === 'gameover') {
                    this.flossTimer = (this.flossTimer || 0) + dt;
                    this.isCasting = false; this.isBlocking = false; this.isDashing = false;
                    if (Math.abs(this.vx) > 0) {
                        this.x += this.vx * dt; this.vx *= 0.85; 
                        if (Math.abs(this.vx) < 0.01) this.vx = 0;
                    }
                    this.vy += GRAVITY * dt * dt; this.y += this.vy; this.resolveGround(); return;
                }

                if (this.stunTimer > 0) {
                    this.stunTimer -= dt;
                    if (Math.abs(this.vx) > 0) {
                        this.x += this.vx * dt; this.vx *= 0.85; 
                        if (Math.abs(this.vx) < 0.01) this.vx = 0;
                    }
                    this.vy += GRAVITY * dt * dt; this.y += this.vy; this.resolveGround(); return;
                }

                if (this.lockedTo) { this.resolveGround(); return; }
                if (this.teleportLock > 0) this.teleportLock -= dt;

                if (this.charType === 'guts' && !this.hasSword && this.swordRef && this.swordRef.stuckInWall) {
                    if (Math.abs(this.x - this.swordRef.x) < 50 && Math.abs(this.y - this.swordRef.y) < 100) {
                        this.hasSword = true; this.swordRef.active = false; this.swordRef = null;
                    }
                }

                if (this.isDashing) {
                    this.dashTimer -= dt; this.vx = this.facing * MOVE_SPEED * 5 * dt; this.vy = 0; this.x += this.vx; this.resolveGround();
                    particles.push(new Particle(this.x, this.y - 45, this.charType === 'gojo' ? '#3b82f6' : (this.charType==='sukuna'?'#ef4444':(this.charType==='saitama'?'#fef08a':(this.charType==='light'?'#000000':'#ffffff')))));
                    if (this.dashTimer <= 0) this.isDashing = false; return;
                }

                if (this.isCasting) {
                    let isAimingPhase = false; let smoothAim = false;
                    if (this.castType === 'purple' && this.castTimer < 2500) { isAimingPhase = true; if (!this.onGround) smoothAim = true; }
                    if (this.castType === 'fuga' && this.castTimer < 2600) isAimingPhase = true;
                    if (this.castType === 'omniult' && this.castTimer < 1000) isAimingPhase = true;
                    if (this.castType === 'saitama_ult' && this.castTimer < 500) isAimingPhase = true; // Still aimable during start
                    
                    if (isAimingPhase) {
                        let dx = 0; let dy = 0;
                        if (keys[this.controls.right]) dx = 1; if (keys[this.controls.left]) dx = -1;
                        if (keys[this.controls.up]) dy = -1; if (keys[this.controls.down]) dy = 1;

                        if (smoothAim) {
                            let rotSpeed = 0.008; 
                            if (keys[this.controls.right]) this.aimAngle += rotSpeed * dt;
                            if (keys[this.controls.left]) this.aimAngle -= rotSpeed * dt;
                            
                            if (this.aimAngle > Math.PI * 2) this.aimAngle -= Math.PI * 2;
                            if (this.aimAngle < 0) this.aimAngle += Math.PI * 2;
                            this.facing = (Math.cos(this.aimAngle) > 0) ? 1 : -1;

                } else if (state === 'cast' && this.castType === 'saitama_counter_punch') {
                    if (this.castTimer > 800) {
                        ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -100, 24, 12, 4); ctx.fill(); drawHand(20, -94);
                    } else {
                        ctx.save(); ctx.translate(0, -100); ctx.rotate(0); 
                        ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, 0, 12, 28, 4); ctx.roundRect(-5, 20, 10, 26, 3); ctx.fill(); drawHand(0, 48); ctx.restore();

                } else if (state === 'cast' && (this.castType === 'omnislam' || this.castType === 'omniult')) {
                    ctx.fillStyle = topColor; ctx.beginPath(); ctx.roundRect(-6, -110, 12, -20, 4); ctx.fill(); drawHand(0, -135);
